name: Dev Release

on:
  workflow_dispatch:

jobs:
  dev-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build launcher JAR
        run: ./gradlew :launcher:jar
        env:
          REPOSILITE_USER: ${{ secrets.REPOSILITE_USER }}
          REPOSILITE_SECRET: ${{ secrets.REPOSILITE_SECRET }}

      - name: Create Dev Pre-release
        run: |
          VERSION=$(grep '^version = ' build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M')
          TAG="v${VERSION}-dev.${TIMESTAMP}"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "VeloCloud ${TAG}" \
            --notes "Dev build from \`$(git rev-parse --short HEAD)\` on \`$(date -u '+%Y-%m-%d %H:%M UTC')\`." \
            --prerelease \
            launcher/build/libs/velocloud-launcher.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
