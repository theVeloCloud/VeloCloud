name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew test
        env:
          REPOSILITE_USER: ${{ secrets.REPOSILITE_USER }}
          REPOSILITE_SECRET: ${{ secrets.REPOSILITE_SECRET }}

      - name: Build launcher JAR
        run: ./gradlew :launcher:jar
        env:
          REPOSILITE_USER: ${{ secrets.REPOSILITE_USER }}
          REPOSILITE_SECRET: ${{ secrets.REPOSILITE_SECRET }}

      - name: Create GitHub Release
        run: |
          PRERELEASE=""
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "VeloCloud ${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE \
            launcher/build/libs/velocloud-launcher.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
